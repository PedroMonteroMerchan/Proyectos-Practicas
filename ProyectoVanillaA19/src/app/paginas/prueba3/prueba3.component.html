<div class="min-h-screen bg-gray-900 flex flex-col items-center justify-center gap-4 p-8">

  <p-toast />

  <h2 class="text-white text-2xl font-bold">Prueba Toast</h2>

  <div class="flex gap-2">
    <p-button label="Éxito" severity="success" (onClick)="mostrar('success')" />
    <p-button label="Error" severity="danger" (onClick)="mostrar('error')" />
    <p-button label="Aviso" severity="warn" (onClick)="mostrar('warn')" />
    <p-button label="Info" severity="info" (onClick)="mostrar('info')" />
  </div>

  <p-button label="Volver" severity="secondary" (onClick)="volver()" />

</div>
