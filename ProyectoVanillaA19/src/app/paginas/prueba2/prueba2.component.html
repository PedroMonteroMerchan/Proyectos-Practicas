<div class="min-h-screen bg-gray-900 flex items-center justify-center p-8">
  <div class="bg-gray-800 rounded-2xl p-8 w-full max-w-lg flex flex-col gap-4">

    <h2 class="text-white text-2xl font-bold">Formulario de prueba</h2>

    <input pInputText [(ngModel)]="form.nombre" placeholder="Nombre" class="w-full" />
    <input pInputText [(ngModel)]="form.email" placeholder="Email" class="w-full" />
    <p-select [options]="roles" [(ngModel)]="form.rol" optionLabel="label" placeholder="Selecciona un rol" class="w-full" />
    <textarea pTextarea [(ngModel)]="form.mensaje" placeholder="Mensaje" rows="3" class="w-full"></textarea>

    <div class="flex items-center gap-2">
      <p-checkbox [(ngModel)]="form.aceptar" [binary]="true" inputId="aceptar" />
      <label for="aceptar" class="text-gray-400 text-sm">Acepto los términos y condiciones</label>
    </div>

    <div class="flex gap-2">
      <p-button label="Enviar" (onClick)="enviar()" />
      <p-button label="Volver" severity="secondary" (onClick)="volver()" />
    </div>

  </div>
</div>
